<div class="flex-1 h-full bg-white dark:bg-slate-950 text-slate-900 dark:text-white flex flex-col">
  <ng-container *ngIf="note; else emptyState">
    <div class="p-6 border-b border-slate-200 dark:border-slate-800">
      <input
        [(ngModel)]="note.title"
        (ngModelChange)="scheduleSave()"
        placeholder="Untitled note"
        class="w-full text-3xl font-bold bg-transparent outline-none"
      />

      <p class="text-xs text-slate-400 mt-2">
        Last updated: {{ note.updatedAt }}
      </p>
    </div>

    <textarea
      [(ngModel)]="note.content"
      (ngModelChange)="scheduleSave()"
      placeholder="Start writing..."
      class="flex-1 w-full resize-none bg-transparent outline-none p-6 text-lg leading-8"
    ></textarea>
  </ng-container>

  <ng-template #emptyState>
    <div class="flex-1 flex items-center justify-center text-slate-400">
      Select or create a note to start writing
    </div>
  </ng-template>
</div>
