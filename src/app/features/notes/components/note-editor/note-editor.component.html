<div class="flex h-full flex-col bg-white text-slate-900 dark:bg-slate-950 dark:text-white">
  <ng-container *ngIf="note; else emptyState">
    <div class="border-b border-slate-200 p-4 dark:border-slate-800 sm:p-6">
      <input
        [(ngModel)]="note.title"
        (ngModelChange)="scheduleSave()"
        placeholder="Untitled note"
        class="w-full bg-transparent text-2xl font-bold outline-none placeholder:text-slate-400 sm:text-4xl"
      />

      <div class="mt-3 flex flex-wrap items-center gap-2 text-xs text-slate-400">
        <span>Last updated: {{ note.updatedAt | date : 'medium' }}</span>
        <span class="rounded-full bg-yellow-100 px-2 py-1 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-200">
          {{ note.syncStatus }}
        </span>
      </div>
    </div>

    <textarea
      [(ngModel)]="note.content"
      (ngModelChange)="scheduleSave()"
      placeholder="Start writing..."
      class="min-h-0 flex-1 resize-none bg-transparent p-4 text-base leading-8 outline-none placeholder:text-slate-400 sm:p-6 sm:text-lg"
    ></textarea>
  </ng-container>

  <ng-template #emptyState>
    <div class="flex flex-1 items-center justify-center p-6 text-center">
      <div>
        <div class="mb-4 text-6xl">✨</div>
        <h2 class="text-xl font-bold">Select or create a note</h2>
        <p class="mt-2 max-w-sm text-sm text-slate-500 dark:text-slate-400">
          Choose a note from the list, or create a fresh note to start writing offline.
        </p>
        <button
          type="button"
          (click)="requestCreateNote()"
          class="mt-5 rounded-xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-950"
        >
          Create note
        </button>
      </div>
    </div>
  </ng-template>
</div>
