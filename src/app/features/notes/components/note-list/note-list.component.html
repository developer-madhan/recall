<div class="flex h-full flex-col bg-white text-slate-900 dark:bg-slate-900 dark:text-white">
  <div class="border-b border-slate-200 p-4 dark:border-slate-800">
    <div class="flex items-center justify-between gap-3">
      <div>
        <h2 class="text-xl font-bold">Notes</h2>
        <p class="text-xs text-slate-500">Create, search, and edit offline</p>
      </div>

      <button
        type="button"
        (click)="createNote()"
        class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-700"
      >
        New
      </button>
    </div>
  </div>

  <div class="min-h-0 flex-1 overflow-y-auto">
    <ng-container *ngIf="notes$ | async as notes">
      <div
        *ngIf="notes.length === 0"
        class="flex h-full flex-col items-center justify-center px-6 text-center text-slate-500"
      >
        <div class="mb-4 text-5xl">📝</div>
        <p class="font-semibold text-slate-700 dark:text-slate-200">No notes yet</p>
        <p class="mt-1 text-sm">Create your first Recall note.</p>
      </div>

      <button
        type="button"
        *ngFor="let note of notes; trackBy: trackByNoteId"
        (click)="selectNote(note)"
        class="block w-full border-b border-slate-100 p-4 text-left transition hover:bg-slate-50 dark:border-slate-800 dark:hover:bg-slate-800"
        [ngClass]="{
          'bg-blue-50 dark:bg-slate-800': selectedNoteId === note.id
        }"
      >
        <div class="flex items-start justify-between gap-3">
          <h3 class="min-w-0 flex-1 truncate font-semibold">
            {{ note.title || 'Untitled Note' }}
          </h3>

          <span
            class="shrink-0 rounded-full px-2 py-1 text-[10px] font-medium"
            [ngClass]="{
              'bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-200': note.syncStatus === 'synced',
              'bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-200': note.syncStatus === 'pending',
              'bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-200': note.syncStatus === 'failed'
            }"
          >
            {{ note.syncStatus }}
          </span>
        </div>

        <p class="mt-2 line-clamp-2 text-sm leading-6 text-slate-500 dark:text-slate-400">
          {{ note.content || 'Empty note...' }}
        </p>

        <div class="mt-3 flex items-center justify-between text-xs text-slate-400">
          <span>{{ note.updatedAt | date : 'mediumDate' }}</span>

          <span
            (click)="deleteNote($event, note)"
            class="rounded-lg px-2 py-1 text-red-500 hover:bg-red-50 dark:hover:bg-red-950"
          >
            Delete
          </span>
        </div>
      </button>
    </ng-container>
  </div>
</div>
