<div class="h-screen flex bg-slate-100 dark:bg-slate-900">
  <app-sidebar
    (createNoteClicked)="createNote()"
    (searchChanged)="onSearchChanged($event)"
  ></app-sidebar>

  <app-note-list
    (noteSelected)="onNoteSelected($event)"
    (noteDeleted)="onNoteDeleted()"
  ></app-note-list>

  <app-note-editor></app-note-editor>
</div>
