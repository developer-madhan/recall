<div class="min-h-screen bg-slate-100 text-slate-900 dark:bg-slate-950 dark:text-white">
  <div class="flex h-screen overflow-hidden">
    <aside class="hidden lg:block">
      <app-sidebar
        (createNoteClicked)="createNote()"
        (searchChanged)="onSearchChanged($event)"
      ></app-sidebar>
    </aside>

    <main class="flex min-w-0 flex-1 flex-col">
      <header class="border-b border-slate-200 bg-white px-4 py-3 dark:border-slate-800 dark:bg-slate-900 lg:hidden">
        <div class="flex items-center justify-between">
          <div>
            <h1 class="text-lg font-bold text-blue-600">Recall</h1>
            <p class="text-xs text-slate-500">Offline-first Notes</p>
          </div>

          <button
            type="button"
            (click)="toggleMobileList()"
            class="rounded-xl border border-slate-300 px-3 py-2 text-sm dark:border-slate-700"
          >
            {{ mobileListOpen ? 'Editor' : 'Notes' }}
          </button>
        </div>

        <input
          *ngIf="mobileListOpen"
          type="search"
          [(ngModel)]="mobileSearchQuery"
          (ngModelChange)="onSearchChanged($event)"
          placeholder="Search notes..."
          class="mt-3 w-full rounded-xl border border-slate-300 bg-slate-50 px-4 py-3 text-sm outline-none focus:border-blue-500 dark:border-slate-700 dark:bg-slate-800"
        />
      </header>

      <div class="flex min-h-0 flex-1">
        <section
          class="w-full border-r border-slate-200 dark:border-slate-800 md:w-80 lg:w-96"
          [class.hidden]="!mobileListOpen"
          [class.md:block]="true"
        >
          <app-note-list
            (noteSelected)="onNoteSelected($event)"
            (noteDeleted)="onNoteDeleted()"
          ></app-note-list>
        </section>

        <section
          class="min-w-0 flex-1"
          [class.hidden]="mobileListOpen"
          [class.md:block]="true"
        >
          <app-note-editor (createNoteClicked)="createNote()"></app-note-editor>
        </section>
      </div>
    </main>
  </div>
</div>
