<div class="min-h-screen bg-slate-50 text-slate-900">
  <header class="sticky top-0 z-20 border-b bg-white/90 backdrop-blur">
    <div class="flex h-16 items-center justify-between px-4">
      <div>
        <h1 class="text-xl font-bold text-blue-700">Recall</h1>
        <p class="text-xs text-slate-500">Offline-first notes</p>
      </div>

      <button
        (click)="createNote()"
        class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
      >
        + New Note
      </button>
    </div>
  </header>

  <main class="grid min-h-[calc(100vh-4rem)] grid-cols-1 md:grid-cols-[280px_1fr]">
    <aside class="border-b bg-white p-4 md:border-b-0 md:border-r">
      <input
        type="search"
        placeholder="Search notes..."
        [(ngModel)]="searchText"
        class="w-full rounded-xl border border-slate-200 px-4 py-3 text-sm outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-100"
      />

      <nav class="mt-4 space-y-2">
        <button class="w-full rounded-xl bg-blue-50 px-4 py-3 text-left text-sm font-medium text-blue-700">
          All Notes
        </button>
        <button class="w-full rounded-xl px-4 py-3 text-left text-sm text-slate-600 hover:bg-slate-100">
          Checklists
        </button>
        <button class="w-full rounded-xl px-4 py-3 text-left text-sm text-slate-600 hover:bg-slate-100">
          Voice Notes
        </button>
      </nav>
    </aside>

    <section class="grid grid-cols-1 lg:grid-cols-[360px_1fr]">
      <div class="border-b bg-white p-4 lg:border-b-0 lg:border-r">
        <h2 class="mb-4 text-sm font-semibold text-slate-500">Recent Notes</h2>

        <div *ngIf="filteredNotes().length === 0" class="rounded-2xl border border-dashed p-6 text-center">
          <p class="text-sm text-slate-500">No notes found</p>
          <button
            (click)="createNote()"
            class="mt-4 rounded-xl bg-blue-600 px-4 py-2 text-sm text-white"
          >
            Create Note
          </button>
        </div>

        <div class="space-y-3">
          <article
            *ngFor="let note of filteredNotes()"
            (click)="selectNote(note)"
            class="cursor-pointer rounded-2xl border p-4 transition hover:border-blue-300"
            [class.border-blue-200]="selectedNote?.id === note.id"
            [class.bg-blue-50]="selectedNote?.id === note.id"
            [class.bg-white]="selectedNote?.id !== note.id"
          >
            <h3 class="font-semibold text-slate-900">
              {{ note.title || 'Untitled Note' }}
            </h3>

            <p class="mt-1 line-clamp-2 text-sm text-slate-600">
              {{ note.content || 'No content yet...' }}
            </p>

            <p
              class="mt-3 text-xs"
              [class.text-blue-700]="note.syncStatus === 'synced'"
              [class.text-amber-600]="note.syncStatus === 'pending'"
            >
              {{ note.syncStatus === 'synced' ? 'Synced' : 'Pending sync' }}
            </p>
          </article>
        </div>
      </div>

      <div class="p-4 md:p-6">
        <div
          *ngIf="selectedNote; else emptyEditor"
          class="mx-auto max-w-3xl rounded-3xl border bg-white p-5 shadow-sm"
        >
          <input
            [(ngModel)]="selectedNote.title"
            (input)="saveNote()"
            placeholder="Untitled Note"
            class="w-full border-none text-2xl font-bold outline-none"
          />

          <textarea
            [(ngModel)]="selectedNote.content"
            (input)="saveNote()"
            rows="14"
            placeholder="Start writing your note..."
            class="mt-4 w-full resize-none border-none text-base leading-7 outline-none"
          ></textarea>

          <div class="mt-6 flex flex-wrap items-center gap-3 border-t pt-4">
            <button class="rounded-xl border px-4 py-2 text-sm hover:bg-slate-50">
              Checklist
            </button>
            <button class="rounded-xl border px-4 py-2 text-sm hover:bg-slate-50">
              Voice
            </button>
            <button class="rounded-xl border px-4 py-2 text-sm hover:bg-slate-50">
              Export PDF
            </button>
            <button class="rounded-xl border px-4 py-2 text-sm hover:bg-slate-50">
              Export Word
            </button>

            <span class="ml-auto text-xs text-amber-600">
              Pending sync
            </span>
          </div>
        </div>

        <ng-template #emptyEditor>
          <div class="mx-auto max-w-3xl rounded-3xl border border-dashed bg-white p-10 text-center">
            <h2 class="text-xl font-bold text-slate-800">No note selected</h2>
            <p class="mt-2 text-sm text-slate-500">Create or select a note to start writing.</p>
          </div>
        </ng-template>
      </div>
    </section>
  </main>
</div>
